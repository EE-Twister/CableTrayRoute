<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your CableTrayRoute account password using a reset token.">
  <title>Reset Password — CableTrayRoute</title>
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/favicon.svg">
  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Reset Password — CableTrayRoute">
  <meta property="og:description" content="Set a new password for your CableTrayRoute account.">
  <meta property="og:image" content="icons/route.svg">
  <meta property="og:site_name" content="CableTrayRoute">
  <meta property="og:url" content="reset-password.html">
  <!-- Canonical URL -->
  <link rel="canonical" href="reset-password.html">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header class="auth-top-bar">
    <a href="index.html" class="auth-brand">
      <img src="icons/route.svg" alt="" class="auth-brand-icon" aria-hidden="true" loading="lazy" decoding="async">
      <span>CableTrayRoute</span>
    </a>
    <nav class="auth-top-links" aria-label="Primary">
      <a href="login.html">Sign In</a>
      <a href="help.html">Help</a>
      <a href="docs/index.html">Docs</a>
    </nav>
  </header>
  <main id="main-content" class="auth-main">
    <section class="auth-card" aria-labelledby="auth-title">
      <header class="auth-header">
        <h1 id="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Enter the reset token provided by your administrator and choose a new password.</p>
      </header>
      <div class="auth-panels" style="grid-template-columns: 1fr;">
        <section class="auth-pane" aria-labelledby="reset-title">
          <h2 id="reset-title">Set a new password</h2>
          <form id="reset-form" class="auth-form">
            <div class="auth-field">
              <label for="reset-token">Reset Token</label>
              <input id="reset-token" name="reset-token" type="text" autocomplete="off" placeholder="Paste token here" required>
            </div>
            <div class="auth-field">
              <label for="reset-pass">New Password</label>
              <input id="reset-pass" name="reset-pass" type="password" autocomplete="new-password" placeholder="New password (min 8 characters)" required minlength="8">
            </div>
            <div class="auth-field">
              <label for="reset-pass-confirm">Confirm Password</label>
              <input id="reset-pass-confirm" name="reset-pass-confirm" type="password" autocomplete="new-password" placeholder="Confirm new password" required minlength="8">
            </div>
            <button type="submit" class="primary-btn">Reset Password</button>
          </form>
          <p class="auth-note" style="margin-top:1rem;">
            Don't have a token? <a href="forgot-password.html">Request one</a> &middot; <a href="login.html">Sign in</a>
          </p>
        </section>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="footer-left">
      <img src="icons/route.svg" alt="CableTrayRoute logo" class="footer-logo" loading="lazy" decoding="async">
      <span>CableTrayRoute</span>
      <span class="footer-copyright">&copy; <span id="footer-year">2026</span> CableTrayRoute contributors</span>
    </div>
    <nav class="footer-links" aria-label="Footer">
      <a href="login.html">Sign In</a>
      <a href="docs/quickstart.html">Quick Start</a>
      <a href="docs/index.html">Docs</a>
    </nav>
  </footer>
  <script type="module">
    const form = document.getElementById('reset-form');

    // Pre-fill token from URL query param ?token=...
    const urlToken = new URLSearchParams(location.search).get('token');
    if (urlToken) {
      document.getElementById('reset-token').value = urlToken;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = document.getElementById('reset-token').value.trim();
      const newPassword = document.getElementById('reset-pass').value;
      const confirm = document.getElementById('reset-pass-confirm').value;
      const btn = form.querySelector('button[type="submit"]');

      let statusEl = form.querySelector('.auth-status');
      if (!statusEl) {
        statusEl = document.createElement('p');
        statusEl.className = 'auth-status';
        statusEl.setAttribute('role', 'status');
        statusEl.setAttribute('aria-live', 'polite');
        form.appendChild(statusEl);
      }

      if (newPassword !== confirm) {
        statusEl.textContent = 'Passwords do not match.';
        statusEl.dataset.error = 'true';
        return;
      }

      btn.disabled = true;
      statusEl.textContent = 'Resetting password…';
      statusEl.dataset.error = 'false';

      try {
        const res = await fetch('/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const body = await res.json().catch(() => ({}));
        if (res.ok) {
          statusEl.textContent = body.message || 'Password reset. You may now sign in.';
          statusEl.dataset.error = 'false';
          form.querySelectorAll('input, button').forEach(el => { el.disabled = true; });
          setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } else {
          statusEl.textContent = body.error || 'Reset failed. Please try again.';
          statusEl.dataset.error = 'true';
          btn.disabled = false;
        }
      } catch {
        statusEl.textContent = 'Reset failed. Check your connection and try again.';
        statusEl.dataset.error = 'true';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
