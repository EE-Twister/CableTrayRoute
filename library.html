<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Manager — CableTrayRoute</title>
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/favicon.svg">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="style.css">
  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Component Library — CableTrayRoute">
  <meta property="og:description" content="Browse and manage the component library for one-line diagram elements.">
  <meta property="og:image" content="https://cabletrayroute.com/icons/og-preview.png">
  <meta property="og:site_name" content="CableTrayRoute">
  <meta property="og:url" content="library.html">
  <!-- Canonical URL -->
  <link rel="canonical" href="library.html">
  <style>
    .sync-status {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.82em;
      font-weight: 600;
      margin-left: 8px;
      vertical-align: middle;
    }
    .sync-status.synced   { background: #d4edda; color: #155724; }
    .sync-status.pending  { background: #fff3cd; color: #856404; }
    .sync-status.offline  { background: #f8d7da; color: #721c24; }
    .sync-status.local    { background: #e2e3e5; color: #383d41; }
    @media (prefers-color-scheme: dark) {
      .sync-status.synced  { background: #1a3a24; color: #6fe08d; }
      .sync-status.pending { background: #3a3000; color: #ffc947; }
      .sync-status.offline { background: #3a1020; color: #f07080; }
      .sync-status.local   { background: #2a2a2a; color: #aaa; }
    }
    .cloud-actions { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .library-editor {
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 12px;
      margin: 10px 0 14px;
      background: #fdfdfd;
    }
    .library-editor h3 { margin: 8px 0; }
    .editor-actions { margin: 8px 0; }
    .editor-grid {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 8px;
      font-size: 0.92rem;
    }
    .editor-grid th,
    .editor-grid td {
      border: 1px solid #d0d7de;
      padding: 6px;
      vertical-align: top;
    }
    .editor-grid input,
    .editor-grid textarea {
      width: 100%;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 0.9rem;
    }
    .editor-grid textarea { min-height: 46px; resize: vertical; }
    .field-hint {
      display: block;
      font-size: 0.78rem;
      min-height: 1.1em;
      color: #b42318;
      margin-top: 2px;
    }
    .advanced-json summary {
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 4px;
    }
    @media (prefers-color-scheme: dark) {
      .library-editor { background: #1f2328; border-color: #3d444d; }
      .editor-grid th,
      .editor-grid td { border-color: #3d444d; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <nav class="top-nav" aria-label="Primary">
    <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation"
            aria-controls="nav-links" aria-expanded="false" title="Toggle navigation">
      <img src="icons/toolbar/grid.svg" alt="" aria-hidden="true"
           class="control-icon" loading="lazy" decoding="async">
    </button>
    <div id="nav-links" class="nav-links" role="list">
      <!-- Populated dynamically by navigation.js -->
    </div>
  </nav>
  <main id="main-content">
  <h1>Library Manager</h1>
  <section>
    <h2>Component Library
      <span id="sync-badge" class="sync-status local" aria-live="polite">Local</span>
    </h2>
    <label>Version <input id="library-version" type="text" size="10"></label><br>
    <div class="library-editor" id="structured-library-editor">
      <h3>Components Grid</h3>
      <table class="editor-grid" aria-label="Components Grid">
        <thead>
          <tr>
            <th>Subtype</th>
            <th>Label</th>
            <th>Category</th>
            <th>Icon</th>
            <th>Ports</th>
            <th>Schema</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="components-grid-body"></tbody>
      </table>
      <div class="editor-actions">
        <button id="add-component-row" type="button">Add Component</button>
      </div>
      <h3>Categories Manager</h3>
      <table class="editor-grid" aria-label="Categories Manager">
        <thead>
          <tr>
            <th>Category</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="categories-grid-body"></tbody>
      </table>
      <div class="editor-actions">
        <button id="add-category-row" type="button">Add Category</button>
      </div>
      <h3>Icons Mapping</h3>
      <table class="editor-grid" aria-label="Icons Mapping">
        <thead>
          <tr>
            <th>Icon Key</th>
            <th>Path</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="icons-grid-body"></tbody>
      </table>
      <div class="editor-actions">
        <button id="add-icon-row" type="button">Add Icon Mapping</button>
      </div>
    </div>
    <details class="advanced-json">
      <summary>Advanced JSON Editor (Power Users)</summary>
      <textarea id="component-text" rows="10" cols="80"></textarea><br>
      <textarea id="icon-text" rows="10" cols="80"></textarea><br>
    </details>
    <label for="library-import-mode">Import mode</label>
    <select id="library-import-mode">
      <option value="replace">Replace library</option>
      <option value="merge">Merge into existing</option>
    </select><br>
    <input type="file" id="library-upload" accept=".xlsx,.xls,.csv,.json,application/json,text/csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"><br>
    <button id="component-save">Save</button>
    <button id="component-download">Download</button>
    <button id="library-download-template">Download Template</button>
    <div class="cloud-actions">
      <button id="cloud-save-btn" title="Save library to your cloud account">Save to Cloud</button>
      <button id="cloud-load-btn" title="Reload library from cloud">Load from Cloud</button>
      <button id="cloud-share-btn" title="Generate a shareable link for this library">Share Library</button>
      <button id="cloud-import-btn" title="Load a library shared by someone else">Load Shared Library</button>
    </div>
  </section>
  <section>
    <h2>Manufacturer Library</h2>
    <textarea id="manufacturer-text" rows="20" cols="80"></textarea><br>
    <button id="manufacturer-save">Save</button>
    <button id="manufacturer-download">Download</button>
  </section>
  <script type="module">
    import './src/components/navigation.js';
    import { getItem, setItem } from './dataStore.mjs';
    import { showAlertModal } from './src/components/modal.js';
    import { getAuthContextState } from './projectStorage.js';
    import { validateLibraryPayload } from './src/validation/librarySchema.mjs';

    // -------------------------------------------------------------------------
    // Sync status badge
    // -------------------------------------------------------------------------
    function setStatus(state, label) {
      const badge = document.getElementById('sync-badge');
      badge.className = `sync-status ${state}`;
      badge.textContent = label;
    }

    // -------------------------------------------------------------------------
    // Cloud API helpers
    // -------------------------------------------------------------------------
    function authState() {
      return getAuthContextState();
    }

    async function cloudGet() {
      const auth = authState();
      if (!auth) return null;
      const res = await fetch('/api/v1/library', {
        headers: { 'Authorization': `Bearer ${auth.token}` },
      });
      if (res.status === 404) return { notFound: true };
      if (!res.ok) return null;
      return res.json();
    }

    async function cloudPut(data, baseVersion) {
      const auth = authState();
      if (!auth) return null;
      const body = baseVersion
        ? { data, baseVersion }
        : { data };
      const res = await fetch('/api/v1/library', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${auth.token}`,
          'X-Csrf-Token': auth.csrfToken,
        },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        if (res.status === 400) {
          const details = await res.json().catch(() => ({}));
          return { validationErrors: details?.details || [] };
        }
        return null;
      }
      return res.json();
    }

    async function cloudShare() {
      const auth = authState();
      if (!auth) return null;
      const res = await fetch('/api/v1/library/shares', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${auth.token}`,
          'X-Csrf-Token': auth.csrfToken,
        },
        body: '{}',
      });
      if (!res.ok) return null;
      return res.json();
    }

    async function cloudLoadShared(token) {
      const res = await fetch(`/api/v1/library/shared/${encodeURIComponent(token)}`);
      if (!res.ok) return null;
      return res.json();
    }

    const structuredState = {
      components: [],
      categories: [],
      icons: {},
    };

    function renderValidationErrors(errors) {
      const filtered = Array.isArray(errors) ? errors : [];
      const title = filtered.some((entry) => entry.severity === 'error')
        ? 'Library validation failed'
        : 'Library validation warnings';
      const list = filtered
        .map((entry) => `• [${entry.severity || 'error'}] ${entry.path || 'root'} — ${entry.message}`)
        .join('\n');
      if (!list) {
        return '';
      }
      return `${title}\n\n${list}`;
    }

    async function validateLibraryForPersistence(payload) {
      const validation = validateLibraryPayload(payload);
      if (!validation.errors.length) {
        return true;
      }
      const hasError = validation.errors.some((item) => item.severity !== 'warning');
      if (hasError) {
        await showAlertModal('Validation Error', renderValidationErrors(validation.errors));
        return false;
      }
      return true;
    }

    function parseJsonSafe(value, fallback) {
      try {
        return JSON.parse(value);
      } catch {
        return fallback;
      }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function syncTextareasFromStructured() {
      const compArea = document.getElementById('component-text');
      const iconArea = document.getElementById('icon-text');
      compArea.value = JSON.stringify({
        categories: structuredState.categories,
        components: structuredState.components,
      }, null, 2);
      iconArea.value = JSON.stringify(structuredState.icons, null, 2);
    }

    function getStructuredPayload() {
      return {
        categories: [...structuredState.categories],
        components: structuredState.components.map((component) => ({ ...component })),
        icons: { ...structuredState.icons },
      };
    }

    function renderCategoriesGrid() {
      const body = document.getElementById('categories-grid-body');
      body.innerHTML = '';
      structuredState.categories.forEach((category, index) => {
        const tr = document.createElement('tr');
        const duplicate = category && structuredState.categories.filter((value) => value === category).length > 1;
        const hint = !category ? 'Required.' : duplicate ? 'Duplicate category.' : '';
        tr.innerHTML = `
          <td>
            <input data-kind="category" data-index="${index}" value="${escapeHtml(category || '')}">
            <span class="field-hint">${escapeHtml(hint)}</span>
          </td>
          <td><button type="button" data-action="delete-category" data-index="${index}">Delete</button></td>
        `;
        body.appendChild(tr);
      });
    }

    function renderIconsGrid() {
      const body = document.getElementById('icons-grid-body');
      body.innerHTML = '';
      Object.entries(structuredState.icons).forEach(([key, path], index) => {
        const keyHint = !key ? 'Required.' : '';
        const pathHint = !path ? 'Required.' : '';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <input data-kind="icon-key" data-index="${index}" value="${escapeHtml(key)}">
            <span class="field-hint">${escapeHtml(keyHint)}</span>
          </td>
          <td>
            <input data-kind="icon-path" data-index="${index}" value="${escapeHtml(path || '')}">
            <span class="field-hint">${escapeHtml(pathHint)}</span>
          </td>
          <td><button type="button" data-action="delete-icon" data-index="${index}">Delete</button></td>
        `;
        body.appendChild(tr);
      });
    }

    function componentHint(component, field) {
      if (field === 'subtype' && !component.subtype) return 'Required.';
      if (field === 'label' && !component.label) return 'Required.';
      if (field === 'category' && !component.category) return 'Required.';
      if (field === 'ports' && !Number.isFinite(component.ports)) return 'Must be a number.';
      if (field === 'schema' && (typeof component.schema !== 'object' || component.schema === null || Array.isArray(component.schema))) {
        return 'Must be a JSON object.';
      }
      return '';
    }

    function renderComponentsGrid() {
      const body = document.getElementById('components-grid-body');
      body.innerHTML = '';
      structuredState.components.forEach((component, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <input data-kind="component-subtype" data-index="${index}" value="${escapeHtml(component.subtype || '')}">
            <span class="field-hint">${escapeHtml(componentHint(component, 'subtype'))}</span>
          </td>
          <td>
            <input data-kind="component-label" data-index="${index}" value="${escapeHtml(component.label || '')}">
            <span class="field-hint">${escapeHtml(componentHint(component, 'label'))}</span>
          </td>
          <td>
            <input data-kind="component-category" data-index="${index}" value="${escapeHtml(component.category || '')}">
            <span class="field-hint">${escapeHtml(componentHint(component, 'category'))}</span>
          </td>
          <td>
            <input data-kind="component-icon" data-index="${index}" value="${escapeHtml(component.icon || '')}">
            <span class="field-hint"></span>
          </td>
          <td>
            <input data-kind="component-ports" data-index="${index}" value="${escapeHtml(Number.isFinite(component.ports) ? component.ports : '')}">
            <span class="field-hint">${escapeHtml(componentHint(component, 'ports'))}</span>
          </td>
          <td>
            <textarea data-kind="component-schema" data-index="${index}">${escapeHtml(JSON.stringify(component.schema ?? {}, null, 2))}</textarea>
            <span class="field-hint">${escapeHtml(componentHint(component, 'schema'))}</span>
          </td>
          <td><button type="button" data-action="delete-component" data-index="${index}">Delete</button></td>
        `;
        body.appendChild(tr);
      });
    }

    function updateInlineHints() {
      document.querySelectorAll('#components-grid-body tr').forEach((row, index) => {
        const component = structuredState.components[index] || {};
        const hints = row.querySelectorAll('.field-hint');
        if (hints[0]) hints[0].textContent = componentHint(component, 'subtype');
        if (hints[1]) hints[1].textContent = componentHint(component, 'label');
        if (hints[2]) hints[2].textContent = componentHint(component, 'category');
        if (hints[4]) hints[4].textContent = componentHint(component, 'ports');
        if (hints[5]) hints[5].textContent = componentHint(component, 'schema');
      });
      document.querySelectorAll('#categories-grid-body tr').forEach((row, index) => {
        const category = structuredState.categories[index];
        const duplicate = category && structuredState.categories.filter((value) => value === category).length > 1;
        const hint = !category ? 'Required.' : duplicate ? 'Duplicate category.' : '';
        const span = row.querySelector('.field-hint');
        if (span) span.textContent = hint;
      });
      document.querySelectorAll('#icons-grid-body tr').forEach((row, index) => {
        const [key, path] = Object.entries(structuredState.icons)[index] || ['', ''];
        const hints = row.querySelectorAll('.field-hint');
        if (hints[0]) hints[0].textContent = key ? '' : 'Required.';
        if (hints[1]) hints[1].textContent = path ? '' : 'Required.';
      });
    }

    function renderStructuredEditors() {
      renderComponentsGrid();
      renderCategoriesGrid();
      renderIconsGrid();
      updateInlineHints();
      syncTextareasFromStructured();
    }

    function hydrateStructuredState(data, iconsValue) {
      const parsedComponents = Array.isArray(data)
        ? data
        : Array.isArray(data.components)
        ? data.components
        : [];
      const parsedCategories = Array.isArray(data.categories) ? data.categories : [];
      const parsedIcons = iconsValue
        || (data && typeof data.icons === 'object' && data.icons ? data.icons : {});
      structuredState.components = parsedComponents.map((component) => ({
        subtype: component?.subtype ?? '',
        label: component?.label ?? '',
        category: component?.category ?? '',
        icon: component?.icon ?? '',
        ports: Number.isFinite(Number(component?.ports)) ? Number(component.ports) : NaN,
        schema: (component?.schema && typeof component.schema === 'object' && !Array.isArray(component.schema))
          ? component.schema
          : {},
      }));
      structuredState.categories = parsedCategories.map((value) => String(value ?? ''));
      structuredState.icons = Object.fromEntries(
        Object.entries(parsedIcons || {}).map(([k, v]) => [k, String(v ?? '')]),
      );
      renderStructuredEditors();
    }

    function syncStructuredFromTextareas() {
      const compArea = document.getElementById('component-text');
      const iconArea = document.getElementById('icon-text');
      const data = parseJsonSafe(compArea.value, { categories: [], components: [] });
      const icons = parseJsonSafe(iconArea.value, {});
      hydrateStructuredState(data, icons);
      updateInlineHints();
    }

    // -------------------------------------------------------------------------
    // Populate textareas from a library data object
    // -------------------------------------------------------------------------
    function populateFromData(data) {
      const versionInput = document.getElementById('library-version');
      hydrateStructuredState({
        categories: data.categories || [],
        components: data.components || [],
      }, data.icons || {});
      if (data.version) versionInput.value = data.version;
    }

    // -------------------------------------------------------------------------
    // Page load
    // -------------------------------------------------------------------------
    let _cloudVersion = null;

    async function load() {
      const manufArea = document.getElementById('manufacturer-text');

      // Try cloud first
      setStatus('pending', '⟳ Syncing…');
      try {
        const result = await cloudGet();
        if (result && !result.notFound) {
          populateFromData(result.data);
          _cloudVersion = result.version;
          setStatus('synced', '☁ Synced');
        } else {
          // Fall back to localStorage / static file
          await loadFromLocal();
          if (authState()) {
            setStatus('local', '☁ Not saved yet');
          } else {
            setStatus('local', 'Local');
          }
        }
      } catch {
        await loadFromLocal();
        setStatus('offline', '⚠ Offline');
      }

      try {
        const res2 = await fetch('manufacturerLibrary.json');
        const data2 = await res2.json();
        const stored2 = getItem('manufacturerDefaults', null);
        manufArea.value = JSON.stringify(stored2 || data2, null, 2);
      } catch {
        manufArea.value = '{}';
      }
    }

    async function loadFromLocal() {
      const versionInput = document.getElementById('library-version');
      const currentVersion = getItem('componentLibraryVersion', '');
      versionInput.value = currentVersion || '';
      const stored = currentVersion ? getItem('componentLibrary_' + currentVersion, null) : null;
      if (stored) {
        hydrateStructuredState({
          categories: stored.categories || [],
          components: stored.components || [],
        }, stored.icons || {});
      } else {
        try {
          const res = await fetch('componentLibrary.json');
          const data = await res.json();
          hydrateStructuredState(data, {});
        } catch {
          hydrateStructuredState({ categories: [], components: [] }, {});
        }
      }
    }

    // -------------------------------------------------------------------------
    // Save locally (and auto-sync to cloud if authenticated)
    // -------------------------------------------------------------------------
    async function saveComponents() {
      const versionInput = document.getElementById('library-version');
      try {
        syncStructuredFromTextareas();
        const { categories, components, icons } = getStructuredPayload();
        const isValid = await validateLibraryForPersistence({ categories, components, icons });
        if (!isValid) return;
        const version = versionInput.value.trim() || 'user';
        setItem('componentLibraryVersion', version);
        setItem('componentLibrary_' + version, { components, categories, icons });

        // Auto-sync to cloud if authenticated
        if (authState()) {
          setStatus('pending', '⟳ Saving…');
          const saved = await cloudPut({ categories, components, icons }, _cloudVersion || undefined);
          if (saved && !saved.validationErrors) {
            _cloudVersion = saved.version;
            setStatus('synced', '☁ Synced');
          } else if (saved?.validationErrors?.length) {
            setStatus('local', '⚠ Validation failed');
            await showAlertModal('Cloud Validation Failed', renderValidationErrors(saved.validationErrors));
          } else {
            setStatus('offline', '⚠ Cloud save failed');
          }
        }

        await showAlertModal('Saved', 'Component library saved successfully.');
      } catch {
        await showAlertModal('Invalid JSON', 'Please check your JSON syntax and try again.');
      }
    }

    // -------------------------------------------------------------------------
    // Download component library
    // -------------------------------------------------------------------------
    async function downloadComponents() {
      const versionInput = document.getElementById('library-version');
      try {
        syncStructuredFromTextareas();
        const { categories, components, icons } = getStructuredPayload();
        const version = versionInput.value.trim() || 'user';
        const blob = new Blob([
          JSON.stringify({ version, categories, components, icons }, null, 2),
        ], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `componentLibrary_${version}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
      } catch {
        await showAlertModal('Invalid JSON', 'Please check your JSON syntax and try again.');
      }
    }

    function parseBoolean(value) {
      if (typeof value === 'boolean') return value;
      if (typeof value !== 'string') return false;
      const normalized = value.trim().toLowerCase();
      return normalized === 'true' || normalized === 'yes' || normalized === '1';
    }

    function parseCsvLine(line) {
      const values = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        if (char === '"') {
          if (inQuotes && line[i + 1] === '"') {
            current += '"';
            i += 1;
            continue;
          }
          inQuotes = !inQuotes;
          continue;
        }
        if (char === ',' && !inQuotes) {
          values.push(current);
          current = '';
          continue;
        }
        current += char;
      }
      values.push(current);
      return values;
    }

    function parseCsvRows(text) {
      const lines = text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line.length > 0);
      if (!lines.length) return [];
      const headers = parseCsvLine(lines[0]).map((header) => header.trim());
      return lines.slice(1).map((line) => {
        const cols = parseCsvLine(line);
        const row = {};
        headers.forEach((header, index) => {
          row[header] = String(cols[index] ?? '').trim();
        });
        return row;
      });
    }

    function mapWorkbookRowsToLibrary(sheets) {
      const componentsSheet = Array.isArray(sheets.Components) ? sheets.Components : [];
      const categoriesSheet = Array.isArray(sheets.Categories) ? sheets.Categories : [];
      const iconsSheet = Array.isArray(sheets.Icons) ? sheets.Icons : [];
      const portsSheet = Array.isArray(sheets.Ports) ? sheets.Ports : [];
      const schemaSheet = Array.isArray(sheets.Schema) ? sheets.Schema : [];

      const portsBySubtype = {};
      portsSheet.forEach((row) => {
        const subtype = String(row.subtype || row.component || row.componentSubtype || '').trim();
        if (!subtype) return;
        const value = Number(row.ports ?? row.portCount ?? row.count ?? row.value);
        if (Number.isFinite(value)) portsBySubtype[subtype] = value;
      });

      const schemaBySubtype = {};
      schemaSheet.forEach((row) => {
        const subtype = String(row.subtype || row.component || row.componentSubtype || '').trim();
        if (!subtype) return;
        if (row.schema) {
          const parsed = parseJsonSafe(row.schema, null);
          if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
            schemaBySubtype[subtype] = parsed;
            return;
          }
        }
        const fieldName = String(row.field || row.name || '').trim();
        if (!fieldName) return;
        const target = schemaBySubtype[subtype] || {};
        target[fieldName] = {
          label: String(row.label || fieldName),
          type: String(row.type || 'string'),
          required: parseBoolean(row.required),
        };
        schemaBySubtype[subtype] = target;
      });

      const components = componentsSheet.map((row) => {
        const subtype = String(row.subtype || row.id || '').trim();
        const ports = Number(row.ports ?? row.portCount ?? portsBySubtype[subtype]);
        const explicitSchema = parseJsonSafe(row.schema, null);
        const schema = explicitSchema && typeof explicitSchema === 'object' && !Array.isArray(explicitSchema)
          ? explicitSchema
          : (schemaBySubtype[subtype] || {});
        return {
          subtype,
          label: String(row.label || subtype || '').trim(),
          category: String(row.category || '').trim(),
          icon: String(row.icon || row.iconKey || '').trim(),
          ports: Number.isFinite(ports) ? ports : NaN,
          schema,
        };
      }).filter((component) => component.subtype);

      const categories = categoriesSheet
        .map((row) => String(row.category || row.name || row.value || '').trim())
        .filter(Boolean);
      if (!categories.length) {
        components.forEach((component) => {
          if (component.category) categories.push(component.category);
        });
      }

      const icons = {};
      iconsSheet.forEach((row) => {
        const key = String(row.icon || row.key || '').trim();
        const path = String(row.path || row.iconPath || '').trim();
        if (key && path) icons[key] = path;
      });

      return {
        categories: [...new Set(categories)],
        components,
        icons,
      };
    }

    async function parseLibraryImportFile(file) {
      const name = file.name.toLowerCase();
      if (name.endsWith('.json')) {
        const obj = parseJsonSafe(await file.text(), null);
        if (!obj) throw new Error('Invalid JSON file.');
        return {
          version: obj.version || '',
          payload: {
            categories: Array.isArray(obj.categories) ? obj.categories : [],
            components: Array.isArray(obj.components) ? obj.components : Array.isArray(obj) ? obj : [],
            icons: obj && typeof obj.icons === 'object' && obj.icons ? obj.icons : {},
          },
        };
      }
      if (name.endsWith('.csv')) {
        const rows = parseCsvRows(await file.text());
        return {
          version: '',
          payload: mapWorkbookRowsToLibrary({ Components: rows }),
        };
      }
      if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
        if (!globalThis.XLSX) {
          throw new Error('Spreadsheet parser unavailable. Please import JSON or CSV instead.');
        }
        const data = new Uint8Array(await file.arrayBuffer());
        const workbook = XLSX.read(data, { type: 'array' });
        const sheets = {};
        workbook.SheetNames.forEach((sheetName) => {
          const sheet = workbook.Sheets[sheetName];
          sheets[sheetName] = XLSX.utils.sheet_to_json(sheet, { defval: '' });
        });
        return {
          version: '',
          payload: mapWorkbookRowsToLibrary(sheets),
        };
      }
      throw new Error('Unsupported file type. Use .xlsx, .xls, .csv, or .json.');
    }

    function mergeLibraryPayload(currentPayload, incomingPayload) {
      const categories = [...new Set([
        ...(Array.isArray(currentPayload.categories) ? currentPayload.categories : []),
        ...(Array.isArray(incomingPayload.categories) ? incomingPayload.categories : []),
      ])];
      const componentMap = new Map();
      (Array.isArray(currentPayload.components) ? currentPayload.components : []).forEach((component) => {
        if (component?.subtype) componentMap.set(component.subtype, component);
      });
      (Array.isArray(incomingPayload.components) ? incomingPayload.components : []).forEach((component) => {
        if (component?.subtype) componentMap.set(component.subtype, component);
      });
      return {
        categories,
        components: Array.from(componentMap.values()),
        icons: {
          ...(currentPayload.icons || {}),
          ...(incomingPayload.icons || {}),
        },
      };
    }

    async function downloadLibraryTemplateWorkbook() {
      if (!globalThis.XLSX) {
        await showAlertModal(
          'Template Export Unavailable',
          'Spreadsheet template generation needs XLSX runtime. Use JSON or CSV import for now.'
        );
        return;
      }
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet([{
        subtype: 'MCC',
        label: 'Motor Control Center',
        category: 'equipment',
        icon: 'icons/components/MCC.svg',
        ports: 2,
        schema: '{"voltage":{"label":"Voltage","type":"number"}}',
      }]), 'Components');
      XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet([
        { category: 'equipment' },
        { category: 'panel' },
      ]), 'Categories');
      XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet([
        { icon: 'icons/components/MCC.svg', path: 'icons/components/MCC.svg' },
      ]), 'Icons');
      XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet([
        { subtype: 'MCC', ports: 2 },
      ]), 'Ports');
      XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet([
        { subtype: 'MCC', schema: '{"voltage":{"label":"Voltage","type":"number"}}' },
      ]), 'Schema');
      XLSX.writeFile(workbook, 'library-template.xlsx');
    }

    // -------------------------------------------------------------------------
    // File upload
    // -------------------------------------------------------------------------
    async function handleUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const parsed = await parseLibraryImportFile(file);
        const importMode = document.getElementById('library-import-mode').value;
        const nextPayload = importMode === 'merge'
          ? mergeLibraryPayload(getStructuredPayload(), parsed.payload)
          : parsed.payload;
        const validation = validateLibraryPayload(nextPayload);
        const hasErrors = validation.errors.some((item) => item.severity !== 'warning');
        if (hasErrors) {
          await showAlertModal('Invalid File', renderValidationErrors(validation.errors));
          return;
        }
        if (parsed.version) document.getElementById('library-version').value = parsed.version;
        hydrateStructuredState({
          categories: nextPayload.categories,
          components: nextPayload.components,
        }, nextPayload.icons);
        setStatus('pending', '⟳ Unsaved');
      } catch (error) {
        await showAlertModal('Invalid File', error?.message || 'Please select a valid library import file.');
      }
    }

    // -------------------------------------------------------------------------
    // Cloud: explicit Save to Cloud
    // -------------------------------------------------------------------------
    async function handleCloudSave() {
      if (!authState()) {
        await showAlertModal('Not logged in', 'Please log in to save your library to the cloud.');
        return;
      }
      try {
        syncStructuredFromTextareas();
        const { categories, components, icons } = getStructuredPayload();
        const isValid = await validateLibraryForPersistence({ categories, components, icons });
        if (!isValid) return;
        setStatus('pending', '⟳ Saving…');
        const saved = await cloudPut({ categories, components, icons });
        if (saved && !saved.validationErrors) {
          _cloudVersion = saved.version;
          setStatus('synced', '☁ Synced');
          await showAlertModal('Saved to Cloud', 'Library saved to your cloud account.');
        } else if (saved?.validationErrors?.length) {
          setStatus('local', '⚠ Validation failed');
          await showAlertModal('Cloud Validation Failed', renderValidationErrors(saved.validationErrors));
        } else {
          setStatus('offline', '⚠ Cloud save failed');
          await showAlertModal('Cloud Save Failed', 'Could not save to cloud. Check your connection or log in again.');
        }
      } catch {
        await showAlertModal('Invalid JSON', 'Please check your JSON syntax and try again.');
      }
    }

    // -------------------------------------------------------------------------
    // Cloud: Load from Cloud
    // -------------------------------------------------------------------------
    async function handleCloudLoad() {
      if (!authState()) {
        await showAlertModal('Not logged in', 'Please log in to load your library from the cloud.');
        return;
      }
      setStatus('pending', '⟳ Loading…');
      try {
        const result = await cloudGet();
        if (!result || result.notFound) {
          setStatus('local', '☁ Not saved yet');
          await showAlertModal('No Cloud Library', 'No library has been saved to your cloud account yet.');
          return;
        }
        populateFromData(result.data);
        _cloudVersion = result.version;
        setStatus('synced', '☁ Synced');
        await showAlertModal('Loaded from Cloud', 'Library loaded from your cloud account.');
      } catch {
        setStatus('offline', '⚠ Offline');
        await showAlertModal('Load Failed', 'Could not load from cloud. Check your connection.');
      }
    }

    // -------------------------------------------------------------------------
    // Cloud: Share Library
    // -------------------------------------------------------------------------
    async function handleCloudShare() {
      if (!authState()) {
        await showAlertModal('Not logged in', 'Please log in to share your library.');
        return;
      }
      try {
        const share = await cloudShare();
        if (!share) {
          await showAlertModal('Share Failed', 'Could not create a share link. Make sure your library is saved to the cloud first.');
          return;
        }
        const url = `${location.origin}/library.html?share=${encodeURIComponent(share.token)}`;
        const expires = new Date(share.expiresAt).toLocaleDateString();
        await showAlertModal(
          'Library Share Link',
          `Share this URL with your team (expires ${expires}):\n\n${url}`
        );
      } catch {
        await showAlertModal('Share Failed', 'An error occurred creating the share link.');
      }
    }

    // -------------------------------------------------------------------------
    // Cloud: Load Shared Library
    // -------------------------------------------------------------------------
    async function handleCloudImport() {
      const input = prompt('Paste the share token or share URL:');
      if (!input) return;
      // Accept full URL or raw token
      let token = input.trim();
      try {
        const u = new URL(token);
        token = u.searchParams.get('share') || token;
      } catch {
        // not a URL — treat as raw token
      }
      setStatus('pending', '⟳ Loading shared…');
      try {
        const result = await cloudLoadShared(token);
        if (!result) {
          setStatus('local', '⚠ Not found');
          await showAlertModal('Not Found', 'The share link is invalid, expired, or revoked.');
          return;
        }
        populateFromData(result.data);
        _cloudVersion = null; // read-only; do not overwrite the sharer's version
        setStatus('local', `Shared by ${result.owner}`);
        await showAlertModal('Library Loaded', `Loaded library shared by ${result.owner}. Use "Save to Cloud" or "Save" to keep it.`);
      } catch {
        setStatus('offline', '⚠ Offline');
        await showAlertModal('Load Failed', 'Could not load the shared library. Check your connection.');
      }
    }

    // -------------------------------------------------------------------------
    // Auto-load shared library if ?share=<token> is in the URL
    // -------------------------------------------------------------------------
    async function maybeLoadShareFromUrl() {
      const params = new URLSearchParams(location.search);
      const shareToken = params.get('share');
      if (!shareToken) return false;
      setStatus('pending', '⟳ Loading shared…');
      try {
        const result = await cloudLoadShared(shareToken);
        if (!result) {
          setStatus('local', '⚠ Expired link');
          await showAlertModal('Expired Link', 'This share link is invalid, expired, or revoked.');
          return false;
        }
        populateFromData(result.data);
        _cloudVersion = null;
        setStatus('local', `Shared by ${result.owner}`);
        return true;
      } catch {
        setStatus('offline', '⚠ Offline');
        return false;
      }
    }

    // -------------------------------------------------------------------------
    // Manufacturer library helpers (unchanged)
    // -------------------------------------------------------------------------
    async function save(id, key) {
      const area = document.getElementById(id);
      try {
        const json = JSON.parse(area.value);
        setItem(key, json);
        await showAlertModal('Saved', 'Library saved successfully.');
      } catch {
        await showAlertModal('Invalid JSON', 'Please check your JSON syntax and try again.');
      }
    }

    function download(id, filename) {
      const area = document.getElementById(id);
      const blob = new Blob([area.value], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }

    // -------------------------------------------------------------------------
    // Wire up events
    // -------------------------------------------------------------------------
    document.getElementById('component-save').addEventListener('click', saveComponents);
    document.getElementById('component-download').addEventListener('click', downloadComponents);
    document.getElementById('library-download-template').addEventListener('click', downloadLibraryTemplateWorkbook);
    document.getElementById('library-upload').addEventListener('change', handleUpload);
    document.getElementById('manufacturer-save').addEventListener('click', () => save('manufacturer-text', 'manufacturerDefaults'));
    document.getElementById('manufacturer-download').addEventListener('click', () => download('manufacturer-text', 'manufacturerLibrary.json'));
    document.getElementById('cloud-save-btn').addEventListener('click', handleCloudSave);
    document.getElementById('cloud-load-btn').addEventListener('click', handleCloudLoad);
    document.getElementById('cloud-share-btn').addEventListener('click', handleCloudShare);
    document.getElementById('cloud-import-btn').addEventListener('click', handleCloudImport);
    document.getElementById('component-text').addEventListener('input', syncStructuredFromTextareas);
    document.getElementById('icon-text').addEventListener('input', syncStructuredFromTextareas);
    document.getElementById('add-component-row').addEventListener('click', () => {
      structuredState.components.push({
        subtype: '',
        label: '',
        category: '',
        icon: '',
        ports: NaN,
        schema: {},
      });
      renderStructuredEditors();
      setStatus('pending', '⟳ Unsaved');
    });
    document.getElementById('add-category-row').addEventListener('click', () => {
      structuredState.categories.push('');
      renderStructuredEditors();
      setStatus('pending', '⟳ Unsaved');
    });
    document.getElementById('add-icon-row').addEventListener('click', () => {
      structuredState.icons[`new-icon-${Object.keys(structuredState.icons).length + 1}`] = '';
      renderStructuredEditors();
      setStatus('pending', '⟳ Unsaved');
    });

    document.getElementById('structured-library-editor').addEventListener('input', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement)) return;
      const index = Number(target.dataset.index);
      const kind = target.dataset.kind;
      if (kind === 'category') {
        structuredState.categories[index] = target.value.trim();
      }
      if (kind === 'component-subtype') structuredState.components[index].subtype = target.value.trim();
      if (kind === 'component-label') structuredState.components[index].label = target.value.trim();
      if (kind === 'component-category') structuredState.components[index].category = target.value.trim();
      if (kind === 'component-icon') structuredState.components[index].icon = target.value.trim();
      if (kind === 'component-ports') {
        const value = target.value.trim();
        structuredState.components[index].ports = value === '' ? NaN : Number(value);
      }
      if (kind === 'component-schema') {
        const parsed = parseJsonSafe(target.value, null);
        structuredState.components[index].schema = parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : null;
      }
      if (kind === 'icon-key' || kind === 'icon-path') {
        const entries = Object.entries(structuredState.icons);
        const row = entries[index];
        if (row) {
          const [currentKey, currentPath] = row;
          if (kind === 'icon-key') {
            const nextIcons = Object.fromEntries(entries);
            delete nextIcons[currentKey];
            nextIcons[target.value.trim()] = currentPath;
            structuredState.icons = nextIcons;
          } else {
            structuredState.icons[currentKey] = target.value.trim();
          }
        }
      }
      syncTextareasFromStructured();
      updateInlineHints();
      setStatus('pending', '⟳ Unsaved');
    });

    document.getElementById('structured-library-editor').addEventListener('click', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const index = Number(target.dataset.index);
      const action = target.dataset.action;
      if (action === 'delete-component') structuredState.components.splice(index, 1);
      if (action === 'delete-category') structuredState.categories.splice(index, 1);
      if (action === 'delete-icon') {
        const key = Object.keys(structuredState.icons)[index];
        if (key) delete structuredState.icons[key];
      }
      if (action) {
        renderStructuredEditors();
        setStatus('pending', '⟳ Unsaved');
      }
    });

    // Initial load: check URL for share token, otherwise normal load
    const sharedLoaded = await maybeLoadShareFromUrl();
    if (!sharedLoaded) {
      await load();
    }
  </script>
  </main>
