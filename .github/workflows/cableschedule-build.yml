name: cableschedule bundle check

on:
  push:
    paths:
      - 'cableschedule.js'
      - 'sizing.js'
      - 'src/voltageDrop.js'
      - 'rollup.config.js'
      - 'dist/cableschedule.js'
  pull_request:
    paths:
      - 'cableschedule.js'
      - 'sizing.js'
      - 'src/voltageDrop.js'
      - 'rollup.config.js'
      - 'dist/cableschedule.js'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm ci
      - name: Build bundles
        run: npm run build
