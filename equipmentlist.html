      <header class="page-header">
        <h1>Equipment List</h1>
        <p>Manage equipment items with basic details.</p>

      <section class="card">
        <div class="mb-1">
          <button id="add-row-btn" class="btn primary-btn add-row-btn" title="Add a new row">Add Row</button>

        <div class="equipment-toolbar mb-1">
          <input type="text" id="equipment-search" class="table-search" placeholder="Search tag, description, manufacturer, category, or model" title="Search by equipment details">
          <select id="equipment-category-filter" class="table-filter-select" title="Filter by category">
            <option value="">All categories</option>
          </select>
          <select id="equipment-preset-select" class="table-filter-select" title="Saved filter presets">
            <option value="">Filter preset...</option>
          </select>
          <button id="save-equipment-preset-btn" class="btn" type="button" title="Save current search and category as a preset">Save Preset</button>

        </div>
        <div id="equipment-quick-filters" class="equipment-quick-filters mb-1" aria-label="Quick filters"></div>
        <p id="equipment-validation-summary" class="equipment-validation-summary mb-1" aria-live="polite"></p>

            <caption class="visually-hidden">Equipment list with tags, ratings, and specifications</caption>
            <thead></thead>

                <option value="number">Number</option>
              </select>
